<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BasedUi | download Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #990000;
            --secondary: #003d99;
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
        }

        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
            background: #020202;
            color: var(--text-main);
            min-height: 100vh;
        }

        #liquid-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            filter: blur(250px);
        }

        .content {
            position: relative;
            z-index: 1;
            padding: 5rem 2rem;
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 5rem;
        }

        header h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 3.8rem;
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 0.5rem;
        }

        header h1 span {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-dim);
            font-weight: 300;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .grid-roms {
            display: flex;
            justify-content: center;
            gap: 3rem;
            perspective: 2000px;
            flex-wrap: wrap;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 2.5rem;
            width: 320px;
            transition: transform 0.1s ease-out, border-color 0.4s ease, background 0.4s ease;
            transform-style: preserve-3d;
        }

        .glass-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.06);
        }

        .tag {
            font-size: 0.65rem;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 100px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .glass-card h3 {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.8rem;
            margin: 1.5rem 0 0.5rem 0;
        }

        .glass-card p {
            color: var(--text-dim);
            font-size: 0.95rem;
            line-height: 1.6;
            font-weight: 300;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 2.5rem;
            transform: translateZ(30px);
        }

        .device-code {
            font-size: 0.8rem;
            color: var(--secondary);
            font-weight: 600;
        }

        .btn-dl {
            text-decoration: none;
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            padding: 12px 24px;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-dl:hover {
            background: #fff;
            color: #000;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <canvas id="liquid-canvas"></canvas>

    <main class="content">
        <header>
            <h1>Based<span>Ui</span></h1>
            <p>The system your way, without limits.</p>
        </header>

        <section class="grid-roms">
            <div class="glass-card">
                <div class="card-header">
                    <span class="tag">Duchamp</span>
                    <h3>Poco X6 Pro</h3>
                </div>
                <p>Builds oficiais com suporte total ao Dimensity 8300-Ultra.</p>
                <div class="footer">
                    <span class="device-code">v1.0.0 - A16</span>
                    <a href="#" class="btn-dl">download</a>
                </div>
            </div>

            <div class="glass-card">
                <div class="card-header">
                    <span class="tag">Rodin</span>
                    <h3>Poco X7 Pro</h3>
                </div>
                <p>Otimizações exclusivas para o hardware de nova geração.</p>
                <div class="footer">
                    <span class="device-code">v1.0.0 - A16</span>
                    <a href="#" class="btn-dl">download</a>
                </div>
            </div>
        </section>
    </main>

    <script>
        // --- EFEITO DE FUNDO LÍQUIDO ---
        const canvas = document.getElementById('liquid-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [];

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 6; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    radius: Math.random() * 250 + 150,
                    color: i % 2 === 0 ? '#282673' : '#732449', 
                    vx: Math.random() * 1.5 - 0.75,
                    vy: Math.random() * 1.5 - 0.75
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();

                p.x += p.vx; 
                p.y += p.vy;

                if (p.x < -p.radius) p.x = width + p.radius;
                if (p.x > width + p.radius) p.x = -p.radius;
                if (p.y < -p.radius) p.y = height + p.radius;
                if (p.y > height + p.radius) p.y = -p.radius;
            });
            requestAnimationFrame(draw);
        } 

        // --- EFEITO TILT (INCLINAÇÃO) NOS CARTÕES ---
        const cards = document.querySelectorAll('.glass-card');

        cards.forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                
                // Intensidade da inclinação (15 graus)
                const rotateX = ((y - centerY) / centerY) * -15; 
                const rotateY = ((x - centerX) / centerX) * 15;
                
                card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.05)`;
            });

            card.addEventListener('mouseleave', () => {
                card.style.transform = `rotateX(0deg) rotateY(0deg) scale(1)`;
            });
        });

        window.addEventListener('resize', init);
        init();
        draw();
    </script>
</body>
</html>
